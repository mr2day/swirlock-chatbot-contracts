openapi: 3.1.0
info:
  title: Swirlock Main LLM Server API
  version: 1.0.0-draft
  summary: Final inference contract for the Swirlock chatbot primary model.
paths:
  /v1/generate:
    post:
      operationId: generateCompletion
      summary: Generate the final assistant response from prepared input
      parameters:
        - $ref: '#/components/parameters/XCorrelationId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GenerateRequest'
      responses:
        '200':
          description: Completion generated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenerateResponse'
        default:
          description: Error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
components:
  parameters:
    XCorrelationId:
      name: x-correlation-id
      in: header
      required: true
      schema:
        type: string
  schemas:
    ApiMeta:
      type: object
      required: [requestId, correlationId, apiVersion, servedAt]
      properties:
        requestId:
          type: string
          format: uuid
        correlationId:
          type: string
        apiVersion:
          type: string
          example: v1
        servedAt:
          type: string
          format: date-time
    ErrorBody:
      type: object
      required: [code, message, retryable]
      properties:
        code:
          type: string
        message:
          type: string
        retryable:
          type: boolean
        details:
          type: object
          additionalProperties: true
    ErrorEnvelope:
      type: object
      required: [meta, error]
      properties:
        meta:
          $ref: '#/components/schemas/ApiMeta'
        error:
          $ref: '#/components/schemas/ErrorBody'
    RequestContext:
      type: object
      required: [callerService, priority, requestedAt]
      properties:
        callerService:
          type: string
        priority:
          type: string
          enum: [interactive, background, maintenance]
        requestedAt:
          type: string
          format: date-time
        timeoutMs:
          type: integer
          minimum: 1
        debug:
          type: boolean
    ChatMessage:
      type: object
      required: [role, content]
      properties:
        role:
          type: string
          enum: [system, user, assistant]
        content:
          type: string
    GenerateRequest:
      type: object
      required:
        - requestContext
        - session
        - messages
      properties:
        requestContext:
          $ref: '#/components/schemas/RequestContext'
        session:
          type: object
          required: [sessionId, turnId, appId]
          properties:
            sessionId:
              type: string
              format: uuid
            turnId:
              type: string
              format: uuid
            appId:
              type: string
        model:
          type: object
          properties:
            modelId:
              type: string
              default: primary-default
            outputMode:
              type: string
              enum: [text, json]
              default: text
        messages:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/ChatMessage'
        generationConfig:
          type: object
          properties:
            temperature:
              type: number
            topP:
              type: number
            maxOutputTokens:
              type: integer
              minimum: 1
            stopSequences:
              type: array
              items:
                type: string
    GenerateResponse:
      type: object
      required: [meta, data]
      properties:
        meta:
          $ref: '#/components/schemas/ApiMeta'
        data:
          type: object
          required:
            - modelId
            - message
            - finishReason
            - generatedAt
          properties:
            modelId:
              type: string
            message:
              type: object
              required: [role, content]
              properties:
                role:
                  type: string
                  enum: [assistant]
                content:
                  type: string
            finishReason:
              type: string
              enum: [stop, length, content_filter, error]
            generatedAt:
              type: string
              format: date-time
            usage:
              type: object
              properties:
                inputTokens:
                  type: integer
                  minimum: 0
                outputTokens:
                  type: integer
                  minimum: 0
                totalTokens:
                  type: integer
                  minimum: 0
