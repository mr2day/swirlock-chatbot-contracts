openapi: 3.1.0
info:
  title: Swirlock RAG Engine API
  version: 2.0.0-draft
  summary: Retrieval and evidence contract for the Swirlock chatbot.
paths:
  /v2/retrieval/evidence:
    post:
      operationId: retrieveEvidence
      summary: Retrieve evidence from local knowledge, live web, or both
      parameters:
        - $ref: '#/components/parameters/XCorrelationId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RetrieveEvidenceRequest'
      responses:
        '200':
          description: Evidence package returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RetrieveEvidenceResponse'
        default:
          description: Error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /v2/health:
    get:
      operationId: getHealth
      summary: Return RAG Engine liveness, readiness, and local dependency diagnostics
      parameters:
        - $ref: '#/components/parameters/XCorrelationId'
      responses:
        '200':
          description: Health returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
        default:
          description: Error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
components:
  parameters:
    XCorrelationId:
      name: x-correlation-id
      in: header
      required: true
      schema:
        type: string
  schemas:
    ApiMeta:
      type: object
      required: [requestId, correlationId, apiVersion, servedAt]
      properties:
        requestId:
          type: string
          format: uuid
        correlationId:
          type: string
        apiVersion:
          type: string
          example: v2
        servedAt:
          type: string
          format: date-time
    ErrorBody:
      type: object
      required: [code, message, retryable]
      properties:
        code:
          type: string
        message:
          type: string
        retryable:
          type: boolean
        details:
          type: object
          additionalProperties: true
    ErrorEnvelope:
      type: object
      required: [meta, error]
      properties:
        meta:
          $ref: '#/components/schemas/ApiMeta'
        error:
          $ref: '#/components/schemas/ErrorBody'
    RequestContext:
      type: object
      required: [callerService, priority, requestedAt]
      properties:
        callerService:
          type: string
        priority:
          type: string
          enum: [interactive, background, maintenance]
        requestedAt:
          type: string
          format: date-time
        timeoutMs:
          type: integer
          minimum: 1
        debug:
          type: boolean
    TextInputPart:
      type: object
      required: [type, text]
      properties:
        type:
          type: string
          const: text
        text:
          type: string
    ImageInputPart:
      type: object
      required: [type]
      oneOf:
        - required: [imageId]
        - required: [imageUrl]
      properties:
        type:
          type: string
          const: image
        imageId:
          type: string
        imageUrl:
          type: string
          format: uri
        mimeType:
          type: string
    InputPart:
      oneOf:
        - $ref: '#/components/schemas/TextInputPart'
        - $ref: '#/components/schemas/ImageInputPart'
    RetrievalHint:
      type: object
      required: [kind, text]
      properties:
        kind:
          type: string
          enum: [entity, time_reference, preference, disambiguation, constraint]
        text:
          type: string
    RetrieveEvidenceRequest:
      type: object
      required:
        - requestContext
        - query
      properties:
        requestContext:
          $ref: '#/components/schemas/RequestContext'
        session:
          type: object
          properties:
            sessionId:
              type: string
              format: uuid
            turnId:
              type: string
              format: uuid
            appId:
              type: string
        query:
          type: object
          required:
            - parts
            - freshness
          properties:
            parts:
              type: array
              minItems: 1
              items:
                $ref: '#/components/schemas/InputPart'
            resolvedQueryText:
              type: string
            intent:
              type: string
            hints:
              type: array
              items:
                $ref: '#/components/schemas/RetrievalHint'
            freshness:
              type: string
              enum: [low, medium, high, realtime]
            allowedModes:
              type: array
              items:
                type: string
                enum: [local_rag, live_web]
            maxEvidenceChunks:
              type: integer
              minimum: 1
              default: 8
            synthesisMode:
              type: string
              enum: [none, brief, detailed]
              default: brief
    NormalizedQuery:
      type: object
      required:
        - modality
        - intent
        - queryText
        - imageObservations
        - retrievalMode
        - freshness
        - reason
      properties:
        modality:
          type: string
          enum: [text, image, multimodal]
        intent:
          type: string
        queryText:
          type: string
        imageObservations:
          type: array
          items:
            type: string
        retrievalMode:
          type: string
          enum: [none, local_rag, live_web, local_and_live]
        freshness:
          type: string
          enum: [low, medium, high, realtime]
        reason:
          type: string
    EvidenceChunk:
      type: object
      required:
        - evidenceId
        - sourceType
        - sourceTitle
        - content
        - relevanceScore
        - retrievedAt
      properties:
        evidenceId:
          type: string
          format: uuid
        sourceType:
          type: string
          enum: [web, local_cache, image_analysis]
        sourceTitle:
          type: string
        sourceUrl:
          type: string
          format: uri
        content:
          type: string
        relevanceScore:
          type: number
        freshnessScore:
          type: number
        publishedAt:
          type: string
          format: date-time
        retrievedAt:
          type: string
          format: date-time
    RetrieveEvidenceResponse:
      type: object
      required: [meta, data]
      properties:
        meta:
          $ref: '#/components/schemas/ApiMeta'
        data:
          type: object
          required:
            - normalizedQuery
            - searchQueries
            - evidenceChunks
          properties:
            normalizedQuery:
              $ref: '#/components/schemas/NormalizedQuery'
            searchQueries:
              type: array
              items:
                type: string
            evidenceChunks:
              type: array
              items:
                $ref: '#/components/schemas/EvidenceChunk'
            evidenceSynthesis:
              type: object
              properties:
                summary:
                  type: string
                confidence:
                  type: string
                  enum: [low, medium, high]
                caveats:
                  type: array
                  items:
                    type: string
            retrievalDiagnostics:
              type: object
              properties:
                liveSearchPerformed:
                  type: boolean
                localSearchPerformed:
                  type: boolean
                durationMs:
                  type: integer
                  minimum: 0
                localResultCount:
                  type: integer
                  minimum: 0
                liveResultCount:
                  type: integer
                  minimum: 0
                liveSearchError:
                  type: string
                warnings:
                  type: array
                  items:
                    type: string
                utilityLlm:
                  type: object
                  description: Optional degraded-mode diagnostics for Utility LLM Host support calls.
                  properties:
                    enabled:
                      type: boolean
                    configuredUrl:
                      type: string
                    usedForQuery:
                      type: boolean
                    usedForImages:
                      type: boolean
                    usedForExtractionSummaries:
                      type: boolean
                    usedForEvidenceSynthesis:
                      type: boolean
                    calls:
                      type: array
                      items:
                        type: object
                        properties:
                          task:
                            type: string
                          attempted:
                            type: boolean
                          succeeded:
                            type: boolean
                          durationMs:
                            type: integer
                            minimum: 0
                          attempts:
                            type: integer
                            minimum: 0
                          error:
                            type: string
                embeddingService:
                  type: object
                  description: Optional degraded-mode diagnostics for Embedding Service calls.
                  properties:
                    enabled:
                      type: boolean
                    configuredUrl:
                      type: string
                    modelId:
                      type: string
                    dimensions:
                      type: integer
                      minimum: 1
                    usedForQuery:
                      type: boolean
                    calls:
                      type: array
                      items:
                        type: object
                        properties:
                          attempted:
                            type: boolean
                          succeeded:
                            type: boolean
                          durationMs:
                            type: integer
                            minimum: 0
                          attempts:
                            type: integer
                            minimum: 0
                          inputCount:
                            type: integer
                            minimum: 0
                          inputType:
                            type: string
                            enum: [query, document]
                          error:
                            type: string
                knowledgeStorePath:
                  type: string
                  description: Redacted local storage location for diagnostics only.
                knowledgeStoreKind:
                  type: string
                  enum: [postgresql, json_file]
    HealthResponse:
      type: object
      required: [meta, data]
      properties:
        meta:
          $ref: '#/components/schemas/ApiMeta'
        data:
          type: object
          required:
            - status
            - ready
            - service
            - apiVersion
            - knowledgeStore
            - providers
          properties:
            status:
              type: string
              enum: [ok, degraded, unavailable]
            ready:
              type: boolean
            service:
              type: string
              const: swirlock-rag-engine
            apiVersion:
              type: string
              const: v2
            knowledgeStore:
              type: object
              properties:
                kind:
                  type: string
                  enum: [postgresql, json_file]
                location:
                  type: string
                ready:
                  type: boolean
                documentCount:
                  type: integer
                  minimum: 0
                schemaVersion:
                  type: integer
                  minimum: 1
                error:
                  type: string
            embeddingJobs:
              type: object
              properties:
                configuredModel:
                  type: string
                configuredDimensions:
                  type: integer
                  minimum: 1
                pending:
                  type: integer
                  minimum: 0
                inProgress:
                  type: integer
                  minimum: 0
                done:
                  type: integer
                  minimum: 0
                failed:
                  type: integer
                  minimum: 0
                embeddedChunks:
                  type: integer
                  minimum: 0
                chunksAwaitingEmbedding:
                  type: integer
                  minimum: 0
            providers:
              type: object
              properties:
                exaConfigured:
                  type: boolean
                utilityLlm:
                  type: object
                  additionalProperties: true
                embeddingService:
                  type: object
                  additionalProperties: true
