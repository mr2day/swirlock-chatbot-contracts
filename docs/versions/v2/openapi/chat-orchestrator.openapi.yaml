openapi: 3.1.0
info:
  title: Swirlock Chat Orchestrator API
  version: 2.0.0-draft
  summary: Client-facing orchestration contract for the Swirlock chatbot.
paths:
  /v2/chat/sessions:
    post:
      operationId: createChatSession
      summary: Create a new chat session
      parameters:
        - $ref: '#/components/parameters/XCorrelationId'
        - $ref: '#/components/parameters/XIdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSessionRequest'
      responses:
        '201':
          description: Session created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateSessionResponse'
        default:
          description: Error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /v2/chat/sessions/{sessionId}/turns:
    post:
      operationId: submitChatTurn
      summary: Submit one user turn and receive one assistant turn
      parameters:
        - $ref: '#/components/parameters/SessionId'
        - $ref: '#/components/parameters/XCorrelationId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubmitTurnRequest'
      responses:
        '200':
          description: Assistant turn generated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubmitTurnResponse'
        default:
          description: Error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
components:
  parameters:
    SessionId:
      name: sessionId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    XCorrelationId:
      name: x-correlation-id
      in: header
      required: true
      schema:
        type: string
    XIdempotencyKey:
      name: x-idempotency-key
      in: header
      required: false
      schema:
        type: string
  schemas:
    ApiMeta:
      type: object
      required:
        - requestId
        - correlationId
        - apiVersion
        - servedAt
      properties:
        requestId:
          type: string
          format: uuid
        correlationId:
          type: string
        apiVersion:
          type: string
          example: v2
        servedAt:
          type: string
          format: date-time
    ErrorBody:
      type: object
      required:
        - code
        - message
        - retryable
      properties:
        code:
          type: string
        message:
          type: string
        retryable:
          type: boolean
        details:
          type: object
          additionalProperties: true
    ErrorEnvelope:
      type: object
      required:
        - meta
        - error
      properties:
        meta:
          $ref: '#/components/schemas/ApiMeta'
        error:
          $ref: '#/components/schemas/ErrorBody'
    RequestContext:
      type: object
      required:
        - callerService
        - priority
        - requestedAt
      properties:
        callerService:
          type: string
          example: chat-client
        priority:
          type: string
          enum: [interactive, background, maintenance]
        requestedAt:
          type: string
          format: date-time
        timeoutMs:
          type: integer
          minimum: 1
        debug:
          type: boolean
    TextInputPart:
      type: object
      required:
        - type
        - text
      properties:
        type:
          type: string
          const: text
        text:
          type: string
    ImageInputPart:
      type: object
      required:
        - type
      oneOf:
        - required: [imageId]
        - required: [imageUrl]
      properties:
        type:
          type: string
          const: image
        imageId:
          type: string
        imageUrl:
          type: string
          format: uri
        mimeType:
          type: string
    InputPart:
      oneOf:
        - $ref: '#/components/schemas/TextInputPart'
        - $ref: '#/components/schemas/ImageInputPart'
    CreateSessionRequest:
      type: object
      required:
        - requestContext
        - participant
        - app
      properties:
        requestContext:
          $ref: '#/components/schemas/RequestContext'
        participant:
          type: object
          required:
            - userId
          properties:
            userId:
              type: string
            displayName:
              type: string
        app:
          type: object
          required:
            - appId
          properties:
            appId:
              type: string
            personaId:
              type: string
        client:
          type: object
          properties:
            channel:
              type: string
            clientVersion:
              type: string
    CreateSessionResponse:
      type: object
      required:
        - meta
        - data
      properties:
        meta:
          $ref: '#/components/schemas/ApiMeta'
        data:
          type: object
          required:
            - sessionId
            - createdAt
            - status
          properties:
            sessionId:
              type: string
              format: uuid
            createdAt:
              type: string
              format: date-time
            status:
              type: string
              enum: [active]
    SubmitTurnRequest:
      type: object
      required:
        - requestContext
        - message
      properties:
        requestContext:
          $ref: '#/components/schemas/RequestContext'
        clientTurnId:
          type: string
        message:
          type: object
          required:
            - parts
            - occurredAt
          properties:
            parts:
              type: array
              minItems: 1
              items:
                $ref: '#/components/schemas/InputPart'
            occurredAt:
              type: string
              format: date-time
        options:
          type: object
          properties:
            responseMode:
              type: string
              enum: [blocking]
              default: blocking
            maxOutputTokens:
              type: integer
              minimum: 1
            includeDiagnostics:
              type: boolean
              default: false
    CitationRef:
      type: object
      required:
        - evidenceId
        - sourceTitle
      properties:
        evidenceId:
          type: string
          format: uuid
        sourceTitle:
          type: string
        sourceUrl:
          type: string
          format: uri
    SubmitTurnResponse:
      type: object
      required:
        - meta
        - data
      properties:
        meta:
          $ref: '#/components/schemas/ApiMeta'
        data:
          type: object
          required:
            - sessionId
            - turnId
            - assistantMessage
          properties:
            sessionId:
              type: string
              format: uuid
            turnId:
              type: string
              format: uuid
            assistantMessage:
              type: object
              required:
                - messageId
                - content
                - createdAt
              properties:
                messageId:
                  type: string
                  format: uuid
                content:
                  type: string
                createdAt:
                  type: string
                  format: date-time
            citations:
              type: array
              items:
                $ref: '#/components/schemas/CitationRef'
            diagnostics:
              type: object
              properties:
                retrievalUsed:
                  type: boolean
                memoryFragmentCount:
                  type: integer
                  minimum: 0
                retrievalMode:
                  type: string
                  enum: [none, local_rag, live_web, local_and_live]
